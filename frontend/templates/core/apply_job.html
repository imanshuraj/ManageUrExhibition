{% extends 'core/base.html' %}
{% block title %}Apply for {{ job.title }} – ManageUrExhibition{% endblock %}
{% block content %}
<style>
    .apply-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        max-width: 600px;
        margin: 40px auto;
    }
</style>
<div class="container pb-5">
    <div class="apply-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Apply for {{ job.title }}</h2>
            <p class="text-muted"><i class="bi bi-geo-alt-fill text-primary"></i> {{ job.location }}</p>
        </div>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text" name="candidate_name" class="form-control form-control-lg bg-light" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" name="candidate_email" class="form-control form-control-lg bg-light" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Resume (PDF, DOCX)</label>
                <input type="file" name="resume" class="form-control form-control-lg" accept=".pdf,.doc,.docx" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm rounded-pill py-3">
                <i class="bi bi-send-fill me-2"></i>Submit Application
            </button>
        </form>
    </div>
</div>
{% endblock %}
